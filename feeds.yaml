# ═══════════════════════════════════════════════════════════════
# GLOBAL PULSE — Hierarchical Feed Configuration
# ═══════════════════════════════════════════════════════════════
# Feeds are organized by geographic scope. The app automatically
# selects feeds based on zoom level and map position:
#
#   global    → zoom < 4  (world view)
#   region    → zoom 4-5  (continent/large region)
#   subregion → zoom 5-7  (sub-region, e.g. "Western Europe")
#   national  → zoom 7-9  (country level)
#   local     → zoom 10+  (city level — uses Google News search)
#
# Topic feeds (tech, business, etc.) are mixed in at all levels.
# ═══════════════════════════════════════════════════════════════

# ── GLOBAL FEEDS (world overview) ────────────────────────────
global:
  - label: BBC World
    url: https://feeds.bbci.co.uk/news/world/rss.xml
  - label: Al Jazeera
    url: https://www.aljazeera.com/xml/rss/all.xml
