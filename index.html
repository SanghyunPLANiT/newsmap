<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GLOBAL PULSE</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:    #0f0e0c;
  --paper:  #f0ebe0;
  --accent: #c8392b;
  --muted:  #7a7468;
  --surf:   #1a1917;
  --surf2:  #242220;
  --border: #2e2c29;
  --list-w: 320px;
  --art-w:  420px;
}
html, body { height: 100%; overflow: hidden; background: var(--ink); color: var(--paper); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; }
#app  { display: flex; flex-direction: column; height: 100vh; }
#main { flex: 1; display: flex; overflow: hidden; min-height: 0; position: relative; }

/* ── HEADER ── */
#hdr {
  flex: 0 0 48px; display: flex; align-items: center; gap: 10px;
  padding: 0 14px; background: var(--surf); border-bottom: 1px solid var(--border);
}
#logo { font-size: 1rem; font-weight: 700; letter-spacing: .08em; white-space: nowrap; }
#logo span { color: var(--accent); }
#hdr-status { font-size: .68rem; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#search { font-size: .78rem; width: 170px; padding: 5px 10px; background: var(--surf2); border: 1px solid var(--border); border-radius: 3px; color: var(--paper); outline: none; }
#search::placeholder { color: var(--muted); }
#search:focus { border-color: var(--muted); }
#btn-rf { font-size: .7rem; padding: 4px 11px; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; border-radius: 3px; letter-spacing: .05em; white-space: nowrap; }
#btn-rf:hover { background: var(--accent); color: #fff; }
#btn-rf:disabled { opacity: .4; cursor: default; }

/* ── LEFT PANEL ── */
#list-panel { width: var(--list-w); flex-shrink: 0; display: flex; flex-direction: column; background: var(--surf); border-right: 1px solid var(--border); overflow: hidden; z-index: 10; }
#list-hdr { padding: 8px 14px; border-bottom: 1px solid var(--border); font-size: .6rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
#list-body { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
#list-body::-webkit-scrollbar { width: 3px; }
#list-body::-webkit-scrollbar-thumb { background: var(--border); }

.empty { padding: 24px 14px; font-size: .72rem; color: var(--muted); text-align: center; line-height: 1.6; }
.loading-row { display: flex; align-items: center; gap: 8px; padding: 13px 14px; border-bottom: 1px solid var(--border); }
.skel { background: var(--border); border-radius: 2px; animation: shimmer 1.4s ease-in-out infinite; }
@keyframes shimmer { 0%,100%{opacity:.4} 50%{opacity:.9} }

.ni { padding: 11px 14px; border-bottom: 1px solid var(--border); cursor: pointer; position: relative; }
.ni:hover { background: var(--surf2); }
.ni.active { background: var(--surf2); }
.ni.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--accent); }
.ni-src   { font-size: .58rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 3px; }
.ni-local { display: inline-block; font-size: .5rem; background: var(--accent); color: #fff; padding: 1px 5px; border-radius: 2px; margin-left: 5px; letter-spacing: .04em; vertical-align: middle; }
.ni-title { font-size: .82rem; line-height: 1.4; color: var(--paper); margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.ni-meta  { font-size: .62rem; color: var(--muted); display: flex; gap: 8px; align-items: center; }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; display: inline-block; }

/* ── MAP ── */
#map-wrap { flex: 1; position: relative; min-width: 0; }
#map { width: 100%; height: 100%; }
.leaflet-container { background: #0f0e0c !important; }
.ntip.leaflet-tooltip { background: var(--surf); border: 1px solid var(--border); border-radius: 3px; color: var(--paper); font-size: .75rem; padding: 5px 9px; box-shadow: 0 4px 12px rgba(0,0,0,.5); }
.ntip.leaflet-tooltip::before { display: none; }

/* ── RIGHT PANEL ── */
#art-panel {
  position: absolute; right: 0; top: 0; bottom: 0; width: var(--art-w); z-index: 500;
  display: flex; flex-direction: column;
  background: var(--surf); border-left: 1px solid var(--border);
  transform: translateX(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
}
#art-panel.open { transform: translateX(0); }
#art-close { position: absolute; top: 10px; right: 10px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); background: var(--surf2); color: var(--muted); cursor: pointer; border-radius: 3px; font-size: .85rem; z-index: 10; }
#art-close:hover { color: var(--paper); border-color: var(--muted); }
#art-body { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
#art-body::-webkit-scrollbar { width: 3px; }
#art-body::-webkit-scrollbar-thumb { background: var(--border); }

.art-src   { padding: 16px 18px 0; font-size: .6rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
.art-title { padding: 8px 18px 0; font-size: 1.15rem; font-weight: 700; line-height: 1.35; color: var(--paper); }
.art-meta  { padding: 7px 18px 0; font-size: .65rem; color: var(--muted); }
.art-loc   { display: inline-flex; align-items: center; gap: 5px; margin: 8px 18px 0; font-size: .7rem; color: var(--muted); background: var(--surf2); padding: 4px 9px; border-radius: 12px; }
.art-img   { margin: 12px 18px 0; border-radius: 4px; overflow: hidden; max-height: 200px; }
.art-img img { width: 100%; height: 200px; object-fit: cover; }
.art-text  { padding: 14px 18px; font-size: .88rem; line-height: 1.75; color: #c5c0b8; }
.art-text p { margin-bottom: 12px; }
.art-link  { display: inline-flex; align-items: center; gap: 6px; margin: 4px 18px 28px; padding: 8px 16px; border: 1px solid var(--accent); color: var(--accent); text-decoration: none; border-radius: 3px; font-size: .72rem; letter-spacing: .05em; }
.art-link:hover { background: var(--accent); color: #fff; }

/* pin pulse */
@keyframes pulse { 0%{transform:scale(1);opacity:.7} 60%{transform:scale(2.2);opacity:0} 100%{transform:scale(2.2);opacity:0} }
.pring { animation: pulse 1.8s ease-out infinite; transform-origin:50% 50%; }

/* rich tooltip */
.ntip.leaflet-tooltip { max-width: 230px; padding: 0; overflow: hidden; }
.tip-img { width: 100%; height: 80px; object-fit: cover; display: block; }
.tip-body { padding: 6px 9px 7px; }
.tip-title { font-size: .72rem; line-height: 1.3; font-weight: 600; color: var(--paper); }
.tip-topic { font-size: .56rem; margin-top: 3px; text-transform: uppercase; letter-spacing: .06em; }

/* cluster popup */
.cluster-popup { z-index: 1000 !important; }
.cluster-popup .leaflet-popup-content-wrapper { background: var(--surf); border: 1px solid var(--border); border-radius: 4px; color: var(--paper); box-shadow: 0 4px 16px rgba(0,0,0,.5); }
.cluster-popup .leaflet-popup-content { margin: 0; padding: 0; max-height: 320px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; width: 260px !important; }
.cluster-popup .leaflet-popup-tip { background: var(--surf); border: 1px solid var(--border); }
.cluster-popup .leaflet-popup-close-button { color: var(--muted); font-size: 18px; padding: 4px 8px; }
.cluster-popup .leaflet-popup-close-button:hover { color: var(--paper); }
.cluster-item { padding: 8px 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
.cluster-item:hover { background: var(--surf2); }
.cluster-item:last-child { border-bottom: none; }

/* topic legend */
#legend { position: absolute; bottom: 30px; left: 10px; z-index: 450; background: var(--surf); border: 1px solid var(--border); border-radius: 4px; padding: 7px 10px; font-size: .58rem; line-height: 2; pointer-events: none; }
.leg-row { display: flex; align-items: center; gap: 5px; }
.leg-line { width: 18px; height: 0; border-top: 2px dashed; }

/* connection line hover */
.leaflet-interactive:hover { cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <header id="hdr">
    <div id="logo">GLOBAL<span>PULSE</span></div>
    <div id="hdr-status">Loading…</div>
    <input id="search" type="text" placeholder="Search stories…" autocomplete="off" spellcheck="false" />
    <button id="btn-rf">↻ Refresh</button>
  </header>
  <div id="main">
    <aside id="list-panel">
      <div id="list-hdr"><span>News Feed</span><span id="list-cnt">—</span></div>
      <div id="list-body"></div>
    </aside>
    <div id="map-wrap">
      <div id="map"></div>
      <div id="legend"></div>
    </div>
    <aside id="art-panel">
      <button id="art-close">✕</button>

    </aside>
  </div>
</div>

function detectPlace(title, desc) {
  const txt = (title + ' ' + stripTags(desc || '')).replace(/\s+/g,' ');
  // Check cities FIRST for precise location
  for (const p of CITY_PLACES) {
    for (const k of p.k) {
      if (txt.includes(k)) return p;
    }
  }
  // Fallback to country-level
  for (const p of PLACES) {
    for (const k of p.k) {
      if (txt.includes(k)) return p;
    }
  }
  return null;
}

// Load feeds from feeds.yaml (handles category groups)
let ALL_YAML_FEEDS = {};  // category → [{label, url}]
async function loadFeedsYaml() {
  try {
    const r = await fetch('feeds.yaml', { signal: AbortSignal.timeout(3000) });
    if (!r.ok) return;
    const text = await r.text();
    const parsed = [];
    let currentCat = 'global';
    ALL_YAML_FEEDS = {};
    for (const line of text.split('\n')) {
      const trimmed = line.trim();
      if (!trimmed || trimmed.startsWith('#')) continue;
      // Category header like "global:", "tech:", etc.
      const catMatch = trimmed.match(/^(\w[\w\s]*):$/);
      if (catMatch) { currentCat = catMatch[1].trim(); continue; }
      if (trimmed.startsWith('- label:')) {
        const entry = { label: trimmed.replace('- label:','').trim(), url:'', cat: currentCat };
        parsed.push(entry);
      } else if (trimmed.startsWith('url:') && parsed.length) {
        parsed[parsed.length - 1].url = trimmed.replace('url:','').trim();
      }
    }
    const valid = parsed.filter(f => f.label && f.url);
    // Group by category
    for (const f of valid) {
      if (!ALL_YAML_FEEDS[f.cat]) ALL_YAML_FEEDS[f.cat] = [];
      ALL_YAML_FEEDS[f.cat].push(f);
    }
    // Default FEEDS = global category only (for initial load — fewer requests)
    if (ALL_YAML_FEEDS.global?.length > 0) {
      FEEDS = ALL_YAML_FEEDS.global;
      console.log(`Loaded ${valid.length} feeds from feeds.yaml (${FEEDS.length} global for initial load)`);
    }
  } catch(e) { console.log('feeds.yaml not found, using defaults'); }
}

function stripTags(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return (d.textContent || '').replace(/\s+/g,' ').trim();
}

function parseRSS(xmlText, label) {
  const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
  const items = [];
  for (const item of doc.querySelectorAll('item')) {
    const get = (tag) => item.querySelector(tag)?.textContent?.trim() || '';
    const title   = get('title');
    const link    = get('link') || item.querySelector('link')?.getAttribute('href') || '';
    const desc    = get('description');
    const content = item.querySelector('content\\:encoded, encoded')?.textContent?.trim() || desc;
    const date    = get('pubDate') || get('dc\\:date') || '';
    const img     = item.querySelector('media\\:thumbnail, media\\:content, enclosure')?.getAttribute('url') || null;
    if (!title) continue;
    items.push({
      id:     Math.random().toString(36).slice(2, 10),
      title, desc, content,
      url:    link,
      date:   date ? new Date(date).toISOString() : '',
      img,
      source: label,
      place:  detectPlace(title, desc + ' ' + content),
      topic:  detectTopic(title, desc + ' ' + content),
    });
  }
  return items;
}

async function proxyFetch(url) {
  for (let i = 0; i < 3; i++) {
    try {
      const r = await fetch(PROXY + encodeURIComponent(url), { signal: AbortSignal.timeout(12000) });
      if (r.ok) return r.text();
      // Retry on rate-limit / server errors
      if (i < 2 && (r.status === 403 || r.status === 429 || r.status >= 500)) {
        await new Promise(res => setTimeout(res, 1200 * (i + 1)));
        continue;
      }
      throw new Error('HTTP ' + r.status);
    } catch(e) {
      if (i === 2 || e.message.startsWith('HTTP')) throw e;
      await new Promise(res => setTimeout(res, 800));
    }
  }
  throw new Error('proxy failed after retries');
}

// Fetch feeds in batches to avoid rate-limiting the proxy
async function loadFeedsBatched(feeds, batchSize) {
  const all = [];
  for (let i = 0; i < feeds.length; i += batchSize) {
    const batch = feeds.slice(i, i + batchSize);
    const results = await Promise.allSettled(batch.map(f => loadFeed(f)));
    for (const r of results) {
      if (r.status === 'fulfilled') all.push(...r.value);
      else console.warn('Feed failed:', r.reason?.message);
    }
    // Pause between batches to avoid proxy rate-limiting
    if (i + batchSize < feeds.length) await new Promise(r => setTimeout(r, 1000));
  }
  return all;
}

async function loadFeed(feed) {
  const xml = await proxyFetch(feed.url);
  return parseRSS(xml, feed.label);
}

// OLLAMA AI GEOCODING
// ══════════════════════════════════════════════
const OLLAMA_URL = 'http://localhost:11434';
let ollamaModel  = null;

async function checkOllama() {
  try {
    const r = await fetch(OLLAMA_URL + '/api/tags', { signal: AbortSignal.timeout(3000) });
    const d = await r.json();
    const models = (d.models || []).map(m => m.name);
    for (const pref of ['qwen2.5:3b','llama3.2:3b','mistral:7b']) {
      if (models.some(n => n === pref || n.startsWith(pref))) { ollamaModel = pref; break; }
    }
    if (!ollamaModel && models.length) ollamaModel = models[0];
    if (ollamaModel) console.log('Ollama ready:', ollamaModel);
    else console.log('Ollama: no models found');
  } catch { console.log('Ollama: offline (keyword geocoding only)'); }
}

async function ollamaGeocode(title, ctx) {
  if (!ollamaModel) return null;
  const prompt =
`Find the most specific physical location of this news event. Go down to the city level whenever possible.
If a specific city, town, or district is mentioned, use its exact coordinates.
If only a country is mentioned, use its capital city.
Always give your best guess. Only use null if there is truly no geographic location.
Headline: "${title}"
${ctx ? `Context: "${ctx.slice(0,200)}"` : ''}
Reply ONLY with JSON: {"city":"<specific city name>","country":"<country>","lat":<number>,"lng":<number>}`;
  try {
    const res = await fetch(`${OLLAMA_URL}/api/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: ollamaModel, prompt, stream: false, format: 'json',
        options: { temperature: 0, num_predict: 200 } }),
      signal: AbortSignal.timeout(25000),
    });
    const raw = (await res.json()).response || '';
    // Regex parser — qwen2.5 outputs malformed JSON
    const city    = (raw.match(/"city"\s*[^:]*:\s*"([^"]*)"/)    || [])[1]?.trim() || null;
    const country = (raw.match(/"country"\s*[^:]*:\s*"([^"]+)"/) || [])[1]?.trim() || null;
    const lat     = parseFloat((raw.match(/"lat[^":\d-]*[":]*\s*([-\d.]+)/) || [])[1]);
    const lng     = parseFloat((raw.match(/"lng[^":\d-]*[":]*\s*([-\d.]+)/) || [])[1]);
    if (!isNaN(lat) && !isNaN(lng) && (city || country)) {
      const name = city || country;
      // Find matching PLACES color or use default
      const placeMatch = PLACES.find(p => p.n === country || p.n === city);
      return { n: name, lat, lng, c: placeMatch?.c || '#e74c3c' };
    }
  } catch(e) { console.warn('Ollama geocode failed:', e.message); }
  return null;
}

// OLLAMA CONTENT ANALYSIS (for smart connections)
// ══════════════════════════════════════════════
const _tagCache = {}; // article id → {tags:[...]}

async function ollamaAnalyze(article) {
  if (_tagCache[article.id]) return _tagCache[article.id];
  if (!ollamaModel) {
    // Fallback: extract simple keywords from title
    const words = article.title.toLowerCase()
      .replace(/[^a-z0-9\s'-]/g, ' ')
      .split(/\s+/)
      .filter(w => w.length > 3 && !['the','and','for','with','from','that','this','have','been','will','said','says','after','about','over','into','than','also','more','just','back','when','what','where','which','their','other','some','could','would','them','were','being'].includes(w));
    _tagCache[article.id] = { tags: [...new Set(words)].slice(0, 8) };
    return _tagCache[article.id];
  }

  const text = stripTags(article.desc || article.content || '').slice(0, 400);
  const prompt =
`Extract 6-10 specific connection tags from this news article. These will be used to find related stories.
Include: specific people names (e.g. "trump", "zelensky"), organizations (e.g. "nato", "opec"), specific events or topics (e.g. "ukraine war", "gaza ceasefire", "ai regulation", "bird flu outbreak"), key locations, and industry terms.
Be specific and lowercase. Use multi-word phrases when needed.
Title: "${article.title}"
${text ? `Context: "${text}"` : ''}
Reply ONLY with JSON: {"tags":["tag1","tag2","tag3",...]}`;

  try {
    const res = await fetch(`${OLLAMA_URL}/api/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: ollamaModel, prompt, stream: false, format: 'json',
        options: { temperature: 0, num_predict: 200 } }),
      signal: AbortSignal.timeout(15000),
    });
    const raw = (await res.json()).response || '';
    const tagsMatch = raw.match(/"tags"\s*:\s*\[([\s\S]*?)\]/);
    if (tagsMatch) {
      const tags = [...tagsMatch[1].matchAll(/"([^"]+)"/g)].map(m => m[1].toLowerCase().trim()).filter(t => t.length > 1);
      if (tags.length > 0) {
        _tagCache[article.id] = { tags, ai: true };
        return _tagCache[article.id];
      }
    }
  } catch(e) { console.warn('Ollama analyze failed:', e.message); }

  // Fallback to simple word extraction
  const words = article.title.toLowerCase().replace(/[^a-z0-9\s'-]/g, ' ').split(/\s+/)
    .filter(w => w.length > 3 && !['the','and','for','with','from','that','this','have','been','will','said','says','after','about','over','into','than','also','more','just','back','when','what','where','which','their','other','some','could','would','them','were','being'].includes(w));
  _tagCache[article.id] = { tags: [...new Set(words)].slice(0, 8) };
  return _tagCache[article.id];
}

// Distance in km between two lat/lng points (haversine)
function distKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// Max distance (km) for an article to be considered "local" at given zoom
function maxDistForZoom(zoom) {
  if (zoom >= 12) return 30;
  if (zoom >= 10) return 80;
  if (zoom >= 9)  return 150;
  if (zoom >= 7)  return 500;
  if (zoom >= 5)  return 2000;
  return 20000; // global
}

// Fetch Google News for a specific query and geocode each article
async function fetchLocalNews(queryLabel, vp) {
  const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(queryLabel + ' news')}&hl=en-US&gl=US&ceid=US:en`;
  const xml = await proxyFetch(rssUrl);
  const items = parseRSS(xml, queryLabel);

  // Deduplicate against existing articles
  const existing = new Set(articles.map(a => a.title.slice(0, 60).toLowerCase()));
  const fresh = items.filter(a => !existing.has(a.title.slice(0, 60).toLowerCase()));

  const btn = document.getElementById('btn-rf');
  const center = map.getCenter();
  const zoom = vp?.zoom || map.getZoom();
  const maxDist = maxDistForZoom(zoom);
  let added = 0;

  for (let i = 0; i < Math.min(fresh.length, 25); i++) {
    const a = fresh[i];
    setStatus(`Geocoding ${i + 1}/${Math.min(fresh.length, 25)}: ${queryLabel}…`);

    // Try Ollama first, then keyword fallback
    if (!a.place && ollamaModel) {
      const geo = await ollamaGeocode(a.title, stripTags(a.desc).slice(0, 200));
      if (geo) a.place = geo;
    }

    // Filter out articles too far from current view
    if (a.place) {
      const d = distKm(center.lat, center.lng, a.place.lat, a.place.lng);
      if (d > maxDist) continue; // skip far-away news
    }

    a.isLocal = true;  // mark as local news
    articles.push(a);
    sortArticlesByViewport();
    added++;

    // Progressive render every article
    renderList();
    renderAllPins();
  }

  const geo = articles.filter(a => a.place).length;
  setStatus(`${articles.length} stories · ${geo} pinned · +${added} from ${queryLabel}`);
  renderLegend();
  btn.disabled = false;
}

// One dot per unique location. If multiple stories share exact coords, show count badge.
// Clicking a cluster dot opens a picker popup; clicking a single-story dot opens the article.
function renderAllPins() {
  pinsLayer.clearLayers();
  for (const k in pinMap) delete pinMap[k];

  // Group articles by exact location
  const groups = {};
  for (const a of articles) {
    if (!a.place) continue;
    const key = `${a.place.lat},${a.place.lng}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(a);
  }

  for (const key of Object.keys(groups)) {
    const group = groups[key];
    const n = group.length;
    const first = group[0];
    const lat = first.place.lat, lng = first.place.lng;

    // Pick the most prominent topic color, or place color
    const topicCounts = {};
    for (const a of group) {
      if (a.topic) topicCounts[a.topic.id] = (topicCounts[a.topic.id] || 0) + 1;
    }
    const topTopic = Object.keys(topicCounts).sort((a,b) => topicCounts[b] - topicCounts[a])[0];
    const color = (topTopic && TOPICS.find(t => t.id === topTopic)?.color) || first.place.c;

    let icon;
    if (n === 1) {
      icon = L.divIcon({
        html: `<div style="width:10px;height:10px;border-radius:50%;background:${color};border:1.5px solid rgba(255,255,255,.45);box-shadow:0 0 5px ${color}55;cursor:pointer"></div>`,
        className: '', iconSize: [10, 10], iconAnchor: [5, 5],
      });
    } else {
      // Cluster dot with count badge
      const size = Math.min(10 + n * 1.5, 24);
      icon = L.divIcon({
        html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:1.5px solid rgba(255,255,255,.55);box-shadow:0 0 8px ${color}66;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:${Math.max(8, size * 0.45)}px;font-weight:700;color:#fff;text-shadow:0 0 3px #000">${n}</div>`,
        className: '', iconSize: [size, size], iconAnchor: [size/2, size/2],
      });
    }

    // Tooltip
    let tip = '<div style="min-width:140px">';
    if (n === 1) {
      if (first.img) tip += `<img class="tip-img" src="${first.img}" onerror="this.style.display='none'"/>`;
      tip += '<div class="tip-body">';
      tip += `<div class="tip-title">${first.title}</div>`;
      if (first.topic) tip += `<div class="tip-topic" style="color:${first.topic.color}">${first.topic.name}</div>`;
      tip += '</div>';
    } else {
      tip += '<div class="tip-body">';
      tip += `<div class="tip-title" style="margin-bottom:4px"><strong>${first.place.n}</strong> · ${n} stories</div>`;
      for (const a of group.slice(0, 4)) {
        tip += `<div style="font-size:.62rem;color:#c5c0b8;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px">• ${a.title}</div>`;
      }
      if (n > 4) tip += `<div style="font-size:.55rem;color:var(--muted)">+${n - 4} more…</div>`;
      tip += '</div>';
    }
    tip += '</div>';

    const marker = L.marker([lat, lng], { icon })
      .bindTooltip(tip, { className: 'ntip', direction: 'top', offset: [0, -8] })
      .on('click', () => {
        if (n === 1) {
          openArticle(first.id);
        } else {
          showClusterPopup(group, lat, lng);
        }
      });
    pinsLayer.addLayer(marker);
    // Map all articles in this group to this marker
    for (const a of group) pinMap[a.id] = marker;
  }
}

// Show cluster stories as a Leaflet popup on the map (above everything including right panel)
let clusterPopup = null;
function showClusterPopup(group, lat, lng) {
  if (clusterPopup) { map.closePopup(clusterPopup); clusterPopup = null; }
  const locName = group[0].place.n;
  const items = group.map(a => {
    const topicTag = a.topic ? `<span style="font-size:.5rem;color:${a.topic.color};text-transform:uppercase;letter-spacing:.04em;margin-left:4px">${a.topic.name}</span>` : '';
    return `<div class="cluster-item" data-aid="${a.id}">
      <div style="font-size:.55rem;text-transform:uppercase;letter-spacing:.06em;color:#7a7468;margin-bottom:2px">${a.source}${topicTag}</div>
      <div style="font-size:.76rem;line-height:1.35;color:#f0ebe0">${a.title}</div>
      <div style="font-size:.55rem;color:#7a7468;margin-top:2px">${timeAgo(a.date)}</div>
    </div>`;
  }).join('');

  const html = `<div style="padding:8px 12px 4px;border-bottom:1px solid #2e2c29">
    <div style="font-size:.85rem;font-weight:700;color:#f0ebe0">${locName}</div>
    <div style="font-size:.6rem;color:#7a7468;margin-bottom:4px">${group.length} stories</div>
  </div>${items}`;

  clusterPopup = L.popup({ className: 'cluster-popup', maxWidth: 280, minWidth: 240, closeButton: true, autoPan: true })
    .setLatLng([lat, lng])
    .setContent(html)
    .openOn(map);

  // Attach click handlers after popup is added to DOM
  setTimeout(() => {
    document.querySelectorAll('.cluster-item').forEach(el => {
      el.addEventListener('click', () => {
        const aid = el.getAttribute('data-aid');
        if (aid) openArticle(aid);
      });
    });
  }, 50);
}

// Connection ID tracks which analysis is current (prevents stale lines from old clicks)
let _connId = 0;

async function showConnectionsFor(article) {
  linesLayer.clearLayers();
  if (!article?.place) return;

  const myId = ++_connId;

  // Analyze clicked article (Ollama or fallback) — single AI call
  const analysis = await ollamaAnalyze(article);
  if (myId !== _connId) return; // user clicked something else while we were analyzing

  const tags = analysis.tags;
  if (!tags.length) return;

  // Search other articles' text for tag matches (instant, no AI calls)
  const candidates = articles.filter(a => a.id !== article.id && a.place);

  for (const r of candidates) {
    const rText = (r.title + ' ' + stripTags(r.desc || r.content || '')).toLowerCase();

    // Find which tags match this candidate
    const shared = tags.filter(tag => {
      // For multi-word tags, check direct inclusion
      if (tag.includes(' ')) return rText.includes(tag);
      // For single words, use word-boundary-ish match
      return new RegExp('\\b' + tag.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i').test(rText);
    });

    if (shared.length >= 1) {
      const strength = Math.min(shared.length, 5);
      const opacity = 0.15 + strength * 0.09;
      const weight = 1 + strength * 0.4;
      const label = shared.slice(0, 3).join(' · ');

      // Pick color: use topic color if same topic, else a neutral gold
      const color = (r.topic?.id === article.topic?.id && article.topic)
        ? article.topic.color
        : '#f0c040';

      const line = L.polyline(
        [[article.place.lat, article.place.lng], [r.place.lat, r.place.lng]],
        { color, weight, opacity, dashArray: '6 4' }
      );
      line.bindTooltip(`<div class="tip-body"><div class="tip-title" style="font-size:.65rem">${label}</div><div style="font-size:.55rem;color:#7a7468;margin-top:2px">${r.title.slice(0,60)}…</div></div>`,
        { sticky: true, className: 'ntip', direction: 'top' });
      linesLayer.addLayer(line);
    }
  }

  // Status update
  const connCount = linesLayer.getLayers().length;
  if (connCount > 0) {
    const tagStr = tags.slice(0, 4).join(', ');
    setStatus(`${connCount} connection${connCount>1?'s':''} — ${analysis.ai ? '🤖' : '🔤'} ${tagStr}`);
  }
}

function highlightPin(a) {
  if (hlMarker) { hlMarker.remove(); hlMarker = null; }
  if (!a?.place) return;
  const color = a.topic?.color || a.place.c;
  const icon = L.divIcon({
    html: `<svg width="36" height="36" viewBox="0 0 36 36" style="pointer-events:none"><circle cx="18" cy="18" r="16" fill="${color}" opacity=".15" class="pring"/><circle cx="18" cy="18" r="8" fill="${color}" opacity=".3"/><circle cx="18" cy="18" r="4.5" fill="${color}"/></svg>`,
    className: '', iconSize: [36, 36], iconAnchor: [18, 18],
  });
  hlMarker = L.marker([a.place.lat, a.place.lng], { icon, zIndexOffset: -1000, interactive: false }).addTo(map);
}

function renderLegend() {
  const used = new Set(articles.filter(a => a.topic).map(a => a.topic.id));
  const rows = TOPICS.filter(t => used.has(t.id)).map(t =>
    `<div class="leg-row"><span class="leg-line" style="border-color:${t.color}"></span> ${t.name}</div>`
  ).join('');
  document.getElementById('legend').innerHTML = rows || '';
}

function timeAgo(iso) {
  if (!iso) return '';
  const s = (Date.now() - new Date(iso)) / 1000;
  if (s < 60)    return 'just now';
  if (s < 3600)  return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function renderList() {
  const pool = query
    ? articles.filter(a => (a.title+' '+(a.place?.n||'')+' '+a.source).toLowerCase().includes(query))
    : articles;
  document.getElementById('list-cnt').textContent = pool.length + ' stories';
  const body = document.getElementById('list-body');
  if (!pool.length) {
    body.innerHTML = '<div class="empty">No stories match.</div>';
    return;
  }
  body.innerHTML = pool.map(a => `
    <div class="ni${a.id===activeId?' active':''}" onclick="openArticle('${a.id}')">
      <div class="ni-src">${a.source}${a.isLocal ? '<span class="ni-local">LOCAL</span>' : ''}</div>
      <div class="ni-title">${a.title}</div>
      <div class="ni-meta">
        ${a.place
          ? `<span><span class="dot" style="background:${a.place.c}"></span> ${a.place.n}</span>`
          : '<span>🌐 World</span>'}
        <span>${timeAgo(a.date)}</span>
      </div>
    </div>`).join('');
}

// ══════════════════════════════════════════════
// ARTICLE PANEL
// ══════════════════════════════════════════════
function openArticle(id) {
  // Close cluster popup if open
  if (clusterPopup) { map.closePopup(clusterPopup); clusterPopup = null; }

  activeId = id;
  const a = articles.find(x => x.id === id);
  if (!a) return;

  // highlight list row
  document.querySelectorAll('.ni').forEach(el =>
    el.classList.toggle('active', el.getAttribute('onclick')?.includes(id)));

  // highlight pin + find connections in background (user can read immediately)
  highlightPin(a);
  showConnectionsFor(a); // async — draws lines progressively while user reads
  if (a.place) {
    _suppressAutoFetch = true;
    map.flyTo([a.place.lat, a.place.lng], Math.max(map.getZoom(), 4), {duration: 0.8});
    setTimeout(() => { _suppressAutoFetch = false; }, 1500);
  }

  // build panel
  const raw   = a.content || a.desc || '';
  const plain = stripTags(raw);
  const paras = plain.split(/\n\n+|(?<=\.)\s{2,}/).map(p=>p.trim()).filter(p=>p.length>40);
  const body  = paras.length
    ? paras.map(p=>`<p>${p}</p>`).join('')
    : `<p>${plain || 'No content available.'}</p>`;

  const fmtDate = a.date
    ? new Date(a.date).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
    : '';

  document.getElementById('art-body').innerHTML = `
    <div class="art-src">${a.source}</div>
    <div class="art-title">${a.title}</div>
    <div class="art-meta">${fmtDate}</div>
    ${a.place ? `<div class="art-loc"><span class="dot" style="background:${a.place.c}"></span>${a.place.n}</div>` : ''}
    ${a.img ? `<div class="art-img"><img src="${a.img}" onerror="this.parentElement.style.display='none'"/></div>` : ''}
    <div class="art-text">${body}</div>
    <a class="art-link" href="${a.url}" target="_blank" rel="noopener">Read full article ↗</a>
  `;
  document.getElementById('art-panel').classList.add('open');
}

document.getElementById('art-close').addEventListener('click', () => {
  document.getElementById('art-panel').classList.remove('open');
  activeId = null;
  _connId++; // cancel any in-progress connection analysis
  if (hlMarker) { hlMarker.remove(); hlMarker = null; }
  linesLayer.clearLayers();
  document.querySelectorAll('.ni.active').forEach(el => el.classList.remove('active'));
});

    let bestCity = null, bestD = Infinity;
    for (const c of CITIES) {
      const d = Math.abs(c.lat - center.lat) + Math.abs(c.lng - center.lng);
      if (d < bestD) { bestD = d; bestCity = c; }
    }
    if (bestCity && bestD < 2) {
      const reg = COUNTRY_REGION[bestCity.country];
      return { key: 'city:' + bestCity.n, label: bestCity.n, regions: reg ? [reg] : null, zoom, city: bestCity };
    }
  }

  // Find PLACES centroids visible in current bounds
  const inView = PLACES.filter(p => bounds.contains([p.lat, p.lng]));

  // At high zoom or no centroids in bounds → use nearest country
  if (inView.length === 0 || zoom >= 7) {
    let best = null, bestD = Infinity;
    for (const p of PLACES) {
      const d = Math.abs(p.lat - center.lat) + Math.abs(p.lng - center.lng);
      if (d < bestD) { bestD = d; best = p; }
    }
    if (best && COUNTRY_REGION[best.n]) {
      const reg = COUNTRY_REGION[best.n];
      return { key: best.n, label: best.n, regions: [reg], zoom };
    }
    return { key:'global', label:'World', regions:null, zoom };
  }

  // Collect unique regions for all visible countries
  const seen = new Map();
  const countryNames = [];
  for (const p of inView) {
    const reg = COUNTRY_REGION[p.n];
    if (reg && !seen.has(reg.label)) seen.set(reg.label, reg);
    countryNames.push(p.n);
  }

  if (seen.size === 0) return { key:'global', label:'World', regions:null, zoom };

  const regs = [...seen.values()];
  const label = countryNames.length <= 3
    ? countryNames.slice(0, 3).join(' · ')
    : regs.map(r => r.label).slice(0, 2).join(' · ') + (regs.length > 2 ? ` +${regs.length-2}` : '');
  return { key: countryNames.join('|'), label, regions: regs, zoom };
}

// ══════════════════════════════════════════════
// FETCH NEWS FOR CURRENT VIEWPORT
// ══════════════════════════════════════════════
function showSkeleton() {
  document.getElementById('list-body').innerHTML =
    Array(6).fill(0).map(()=>`
      <div class="loading-row"><div style="flex:1">
        <div class="skel" style="height:10px;width:50%;margin-bottom:7px"></div>
        <div class="skel" style="height:13px;width:92%;margin-bottom:5px"></div>
        <div class="skel" style="height:13px;width:74%;margin-bottom:8px"></div>
        <div class="skel" style="height:9px;width:38%"></div>
      </div></div>`).join('');
  document.getElementById('list-cnt').textContent = '—';
}

async function loadByViewport(accumulate) {
  if (isFetching) return;
  isFetching = true;
  const btn = document.getElementById('btn-rf');
  btn.disabled = true;

  const vp = getViewportInfo();
  if (!accumulate) showSkeleton();
  setStatus(`Loading: ${vp.label}…`);

  try {
    let feedsToFetch;
    if (!vp.regions) {
      feedsToFetch = FEEDS.slice(0, 8); // limit to avoid proxy rate-limiting
    } else {
      feedsToFetch = vp.regions.flatMap(r => r.feeds);
    }
    const all = await loadFeedsBatched(feedsToFetch, 2);
    finishLoad([all], vp.label, accumulate);
  } catch(e) {
    console.warn('Viewport fetch failed:', e.message);
    setStatus(`⚠ Could not load news for ${vp.label}.`);
    if (!accumulate) document.getElementById('list-body').innerHTML = '<div class="empty">Fetch failed. Try refreshing.</div>';
  }
  isFetching = false;
  btn.disabled = false;
}

// Auto-fetch on zoom/move — accumulate news, local first
let _autoFetchTimer = null;
let _lastAutoKey = '';
let _suppressAutoFetch = false;
map.on('moveend zoomend', () => {
  clearTimeout(_autoFetchTimer);
  _autoFetchTimer = setTimeout(() => {
    if (_suppressAutoFetch) return;
    const vp = getViewportInfo();
    if (vp.key === _lastAutoKey) return; // same viewport, skip
    _lastAutoKey = vp.key;
    // Re-sort existing articles: in-view first
    sortArticlesByViewport();
    renderList();
    // Auto-fetch new content
    autoFetchForViewport();
  }, 800);
});

function sortArticlesByViewport() {
  const bounds = map.getBounds();
  articles.sort((a, b) => {
    const aIn = a.place && bounds.contains([a.place.lat, a.place.lng]);
    const bIn = b.place && bounds.contains([b.place.lat, b.place.lng]);
    if (aIn && !bIn) return -1;
    if (!aIn && bIn) return 1;
    if (a.isLocal && !b.isLocal) return -1;
    if (!a.isLocal && b.isLocal) return 1;
    return (b.date || '') > (a.date || '') ? 1 : -1;
  });
}

async function autoFetchForViewport() {
  if (isFetching) return;
  const vp = getViewportInfo();
  if (!vp.regions) {
    loadByViewport(true);
  } else {
    isFetching = true;
    const btn = document.getElementById('btn-rf');
    btn.disabled = true;
    try {
      await fetchLocalNews(vp.label, vp);
    } catch(e) {
      console.warn('Auto-fetch local news failed, trying regional feeds:', e.message);
      isFetching = false;
      loadByViewport(true);
    }
    isFetching = false;
    btn.disabled = false;
  }
}

// ══════════════════════════════════════════════
// LOAD ALL FEEDS  (global view / refresh)
// ══════════════════════════════════════════════
function finishLoad(groups, label, accumulate) {
  const incoming = groups.flat();
  // Build set of existing titles for dedup
  const seen = new Set();
  if (accumulate) {
    for (const a of articles) seen.add(a.title.slice(0,60).toLowerCase());
  }
  const fresh = incoming.filter(a => {
    const k = a.title.slice(0,60).toLowerCase();
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });

  if (accumulate) {
    articles = [...articles, ...fresh];
  } else {
    articles = fresh;
  }
  // Sort: in-viewport first, then local, then by date
  sortArticlesByViewport();

  if (articles.length === 0) {
    setStatus('⚠ No articles loaded.');
    document.getElementById('list-body').innerHTML =
      `<div class="empty">No stories found for <strong>${label}</strong>.</div>`;
  } else {
    const geo = articles.filter(a=>a.place).length;
    setStatus(`${articles.length} stories · ${geo} pinned · ${label}`);
    renderList();
    renderAllPins();
    renderLegend();
  }
}

document.getElementById('btn-rf').addEventListener('click', async () => {
  if (isFetching) return;
  const vp = getViewportInfo();

  if (!vp.regions) {
    loadByViewport(true);
  } else {
    isFetching = true;
    const btn = document.getElementById('btn-rf');
    btn.disabled = true;
    try {
      await fetchLocalNews(vp.label, vp);
    } catch(e) {
      console.warn('Google News failed, falling back to regional feeds:', e.message);
      isFetching = false;
      loadByViewport(true);
    }
    isFetching = false;
    btn.disabled = false;
  }
});

// Initial load — load feeds config, check Ollama, then fetch news
// Suppress auto-fetch during initial load to avoid doubling proxy requests
(async () => {
  _suppressAutoFetch = true;
  await loadFeedsYaml();
  checkOllama();
  await loadByViewport(false);
  _suppressAutoFetch = false;
  _lastAutoKey = getViewportInfo().key;
})();
</script>
